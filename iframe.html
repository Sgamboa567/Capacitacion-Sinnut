<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="timestamp" content="2025-09-05T20:00:00Z">
    <title>Curso Sinnut ERP - Aula Virtual (Iframe Version)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f8fafc;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        
        .iframe-notice {
            background: linear-gradient(135deg, #0D2339 0%, #1a3b5c 100%);
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 3px solid #22c55e;
        }
        
        .iframe-notice a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 600;
        }
        
        .iframe-notice a:hover {
            text-decoration: underline;
        }
        
        .content-frame {
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
            display: block;
        }
        
        @media (max-width: 768px) {
            .iframe-notice {
                padding: 8px 15px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="iframe-notice">
        📚 Curso Sinnut ERP - Versión: 2025-09-05 | 
        <a href="https://sgamboa567.github.io/Capacitacion-Sinnut" target="_blank">
            🔗 Abrir en ventana completa
        </a>
    </div>
    
    <iframe 
        src="./index.html" 
        class="content-frame"
        allowfullscreen
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation-by-user-activation">
    </iframe>
    
    <script>
        // Forzar recarga cada 5 minutos para iframes embebidos
        if (window.self !== window.top) {
            console.log('Iframe wrapper cargado - Versión: 2025-09-05T20:00:00Z');
            
            // Recargar automáticamente cada 5 minutos
            setTimeout(() => {
                window.location.reload(true);
            }, 300000); // 5 minutos
        }
        
        // Timestamp para debugging
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Iframe wrapper listo - Timestamp:', new Date().toISOString());
        });
    </script>
</body>
</html>
